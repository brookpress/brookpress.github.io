        <h1>Brook Press</h1>
        <p>Brook Pressは東京の小川町（Brookは小川の意）を拠点に、2023年に始動した小規模で実験的な出版の実践です。武蔵野美術大学芸術文化学科の古賀稔章ゼミに集う学生が主体となり、印刷機リソグラフを活用して、執筆・編集・デザイン・印刷・製本・流通の全てを自ら担う雑誌『PAN』の刊行を軸に、外部機関と連携したキュラトリアルな社会実践や、専門家を招聘したレクチャー、ワークショップ等も展開。私たちが生きる世界に、印刷物を通じて小さな声を挙げるための出版活動のプロトタイプを探求しています。</p>
